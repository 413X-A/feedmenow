<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Pflanzen Tycoon - Startseite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="loadGame()">
  <div class="top-ui">
    <span>Gold: <span id="gold">0</span></span> |
    <span>Level: <span id="level">1</span></span> |
    <span>XP: <span id="xp">0</span></span>
  </div>

  <div class="menu">
    <button onclick="goShop()">Shop</button>
    <button onclick="exportBackup()">Backup Exportieren</button>
    <input type="file" id="importFile" onchange="importBackup(event)">
  </div>

  <h2>Felder</h2>
  <div class="fields">
    <div class="field-box" onclick="goField('normal')">🌱 Normale Felder</div>
    <div class="field-box" onclick="goField('water')">💧 Wasser-Felder</div>
    <div class="field-box" onclick="goField('night')">🌙 Nacht-Felder</div>
    <div class="field-box" onclick="goField('sand')">🏜️ Sand-Felder</div>
    <div class="field-box" onclick="goField('greenhouse')">🏡 Gewächshaus</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
